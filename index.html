        async function handleSignUp() {

            if(!email || !password) return alert('가입할 이메일과 비밀번호를 채워주세요!');
            if(password.length < 6) return alert('비밀번호는 최소 6자리 이상이어야 합니다!');

        async function initApp() {

            document.getElementById('sound-toggle').innerText = soundEnabled ? '🔊' : '🔇';

                    }
                });

            calculateStreak();
            setupRealtimeSync();

        async function loadDiariesFromServer() {
            try {
                const { data, error } = await _supabase
                    .from('diary_entries')
                    .select('*')
                    .eq('username', childName);
                if (error) throw error;
                diaryDatabase = {};
                if(data) {
                    data.forEach(item => {
                        diaryDatabase[item.diary_date] = {
                            text: item.diary_text,
                            weather: item.weather,
                            image: item.image_data,
                            name: item.username
                        };
                    });
                }
            } catch (err) {
                console.error("서버 데이터 로드 실패:", err.message);
            }
        }

        function setupRealtimeSync() {
            if (communityChannel) {
                _supabase.removeChannel(communityChannel);
            }

            communityChannel = _supabase
                .channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    { event: '*', pattern: 'public', table: 'diary_entries' },
                    (payload) => {
                        const box = document.getElementById('community-list');
                        if (box && !box.classList.contains('hidden')) {
                            fetchCommunityData();
                        }
                        if (payload.new && payload.new.username === childName) {
                            loadDiariesFromServer().then(() => {
                                renderCalendar();
                                calculateStreak();
                            });
                        }
                    }
                )
                .subscribe();
        }

            const box = document.getElementById('community-list');

                box.classList.add('hidden');
                return;
            }
            box.classList.remove('hidden');
            await fetchCommunityData();
        }

        function setupCanvas() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            canvas.addEventListener('touchstart', startDrawingTouch);
            canvas.addEventListener('touchmove', drawTouch);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - 34;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function clearCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function startDrawing(e) { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); }
        function draw(e) {
            if (!isDrawing) return;
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }
        function startDrawingTouch(e) {
            isDrawing = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
            e.preventDefault();
        }
        function drawTouch(e) {
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        }
        function stopDrawing() { isDrawing = false; }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const compCanvas = document.createElement('canvas');
                        const compCtx = compCanvas.getContext('2d');
                        const max_width = 500; 
                        const scale = max_width / img.width;
                        compCanvas.width = max_width;
                        compCanvas.height = img.height * scale;
                        compCtx.drawImage(img, 0, 0, compCanvas.width, compCanvas.height);
                        
                        selectedImageData = compCanvas.toDataURL('image/jpeg', 0.7); 
                        showFinalPreview(selectedImageData);
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function showFinalPreview(dataUrl) {
            const preview = document.getElementById('image-preview');
            preview.src = dataUrl;
            preview.classList.remove('hidden');
            document.getElementById('reset-media-btn').classList.remove('hidden');
        }

        function resetMediaSelection() {
            selectedImageData = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('reset-media-btn').classList.add('hidden');
            document.getElementById('image-input').value = "";
            if (canvas) clearCanvas();
        }

       // [교정 및 보완 좌표: saveDiary 함수 전체 교체]
async function saveDiary(silent = false) {

    let fileName = ""; 
    
    const dateStr = selectedDiaryDate;
    const text = document.getElementById('diary-text').value;
    const weather = document.getElementById('weather').value;

        thumbCanvas.height = (300 / canvas.width) * canvas.height;
        thumbCtx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
        selectedImageData = thumbCanvas.toDataURL('image/jpeg', 0.5);
    }

    if(!text && !selectedImageData) {
        if(!silent) alert('내용이나 그림을 작성해 주세요!');
        return;
    }

    try {
  if (selectedImageData && selectedImageData.startsWith('data:')) {
    // 1. 기존의 childName을 참조하던 로직을 완전히 삭제
    // 2. 오직 타임스탬프와 랜덤 숫자만 사용하여 한글 유입을 원천 차단
    const timestamp = Date.now();
    const randomSuffix = Math.floor(Math.random() * 10000);
    fileName = `diary_${timestamp}_${randomSuffix}.jpg`; 

    const base64Data = selectedImageData.split(',')[1];
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: 'image/jpeg' });

            const { error: uploadError } = await _supabase.storage
                .from('Mongle_Daily')
                .upload(fileName, blob, { contentType: 'image/jpeg', upsert: true });
            if(uploadError) throw uploadError;

            const { data: publicUrlData } = _supabase.storage
                .from('Mongle_Daily')
                .getPublicUrl(fileName);
            imageUrl = publicUrlData.publicUrl;
            
        } else if (selectedImageData) {
            imageUrl = selectedImageData;
        }

        const { error } = await _supabase
            .from('diary_entries')
            .upsert({
                diary_date: dateStr,
                username: childName,  
                weather: weather,
                diary_text: text,
                image_data: imageUrl
            }, 
            { onConflict: 'username,diary_date' });
        if (error) throw error;

        diaryDatabase[dateStr] = {
            text: text,
            weather: weather,
            image: imageUrl,
            name: childName
        };

        // ----------------------------------------------------
        // 🚀 [추가 및 연동] 일기 저장 성공 직후 전체 푸시 알림 발송 트리거 가동
        // ----------------------------------------------------
        // 유저 화면 흐름이 끊기지 않게 await를 붙이지 않고 비동기로 호출합니다.
        sendPushNotificationToAll(childName, text || "그림만 그렸어요 🎨");
        // ----------------------------------------------------

        if(!silent) {
            if(soundEnabled) {
                stampSound.currentTime = 0;
                stampSound.play().catch(() => {});
            }
            alert('💮 일기를 잘 썼어요!');
        }
        
        await loadDiariesFromServer();
        renderTodayForm();
        renderCalendar();
        calculateStreak();
        
    } catch(err) {
        console.error("저장 에러 상세:", err);
        alert('🚨 서버 전송 중 에러가 발생했습니다: ' + err.message);
    }

// 🌐 [신규 추가] DB에 등록된 모든 계정에 웹 푸시 요청을 쏘는 핵심 브로드캐스팅 함수
async function sendPushNotificationToAll(writerName, diarySnippet) {
    try {
        // 1. push_subscriptions 테이블에 등록된 모든 유저 기기 명부 수집
        const { data: subscribers, error } = await _supabase
            .from('push_subscriptions')
            .select('*');

        if (error) throw error;
        if (!subscribers || subscribers.length === 0) return;

        // 2. 외부 알림 브로커 서비스(또는 가상 프록시 엔드포인트) 호출 연동
        // 명부에 등록된 기기들을 순회하며 자신을 제외한 모두에게 신호를 브로드캐스팅합니다.
        subscribers.forEach(async (sub) => {
            if (sub.username === writerName) return; // 글쓴이 본인은 제외

            // Web Push 표준 명세 프로토콜에 의거하여 알림 페이로드 전송
            // 웹 표준 Push의 암호화 키쌍 규칙에 맞추어 구독 기기로 직접 포스트 패치를 수행합니다.
            await fetch(sub.endpoint, {
                method: 'POST',
                headers: {
                    'TTL': '60',
                    'Content-Type': 'application/octet-stream'
                },
                body: JSON.stringify({
                    title: '📖 몽글 그림일기장 알림',
                    body: `🧒 '${writerName}' 친구가 방금 일기를 올렸어요!`
                })
            }).catch(e => console.log("알림 개별 전송 패스 (오프라인 기기 등):", e.message));
        });

    } catch (err) {
        console.error("푸시 전송 엔진 내부 예외:", err.message);
    }
}

        // 웹 푸시 서비스 워커 등록 및 권한 요청 함수
        async function initPushNotification() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                console.log('이 브라우저는 푸시 알림을 지원하지 않습니다.');
                return;
            }

            try {
                // 1. 서비스 워커 등록 확인
                const registration = await navigator.serviceWorker.register('/service-worker.js');
                console.log('서비스 워커가 등록되었습니다:', registration);

                // 2. 알림 권한 요청
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    console.log('사용자가 알림 권한을 거부했습니다.');
                    return;
                }

                // 3. 푸시 서버(FCM VAPID) 구독 생성
                // *주의: 공용 VAPID 공개키를 사용하거나 Firebase 콘솔에서 발급받은 키를 주입해야 합니다.
                const applicationServerKey = urlB64ToUint8Array('BOvCKLrC7KfVQ_wl7wY5qPSHoNMer8c7DTJk-E1mdd01rDgWDzYkNDOV0-XHNWxn5TVfr_RhFvLuOi5IWPBeQoU');
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: applicationServerKey
                });

                // 4. 발급받은 기기 토큰 신호를 Supabase DB에 업서트(공유 저장)
                const subscriptionJson = subscription.toJSON();
                await _supabase
                    .from('push_subscriptions')
                    .upsert({
                        endpoint: subscriptionJson.endpoint,
                        auth: subscriptionJson.keys.auth,
                        p256dh: subscriptionJson.keys.p256dh,
                        username: childName
                    }, { onConflict: 'endpoint' });

                console.log('🚀 모든 계정 브로드캐스팅 푸시 알림 명부에 등록 완료!');

            } catch (err) {
                console.error('푸시 알림 등록 중 예외 발생:', err);
            }
        }

        // VAPID 키 변환용 헬퍼 함수
        function urlB64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
        
    </script>
