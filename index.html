<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국민학교 여름방학 그림일기장 (클라우드 완결본)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2b4436">

    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Gamja Flower', sans-serif;
            background-color: #2b4436; /* 90년대 교실 녹색 칠판색 배경 */
        }
        
        .retro-paper {
            background-color: #fcf8ee;
            border: 8px double #8b5a2b;
        }

        /* [교정] 모바일/팝업 등 가변 창을 위한 vw 기반 반응형 깍두기 공책 설정 */
        .kakdugi-notebook {
            font-size: clamp(18px, 5vw, 26px);
   	    line-height: 1.8;
            letter-spacing: 0.08em;
	    padding: 14px;
    
	    background-attachment: local;
	    background-image: 
        	linear-gradient(to right, rgba(239, 68, 68, 0.15) 1px, transparent 1px),
	        linear-gradient(to bottom, rgba(239, 68, 68, 0.15) 1px, transparent 1px);

	    background-size: 2.2em 2.2em;
	    background-position: 0.4em 0.2em;

	    font-weight: bold;
	    color: #2d3748;

	    word-break: keep-all;
	    overflow-wrap: break-word;
        }

        /* [교정] 화면이 넓은 데스크톱 환경(lg 해상도 이상)에서는 격자가 너무 커지지 않도록 고정px 락(Lock) 구현 */
        @media (min-width: 1024px) {
            .kakdugi-notebook {
                font-size: 24px;
                line-height: 36px;
                letter-spacing: 12px;
                padding: 14px 12px;
                background-size: 36px 36px;
                background-position: 8px 4px;
            }
        }

        /* [교정] 모달 내 깍두기 박스 배경 격자와 글자 정렬 비율 완벽 싱크로 조율 */
      #modal-text.kakdugi-notebook {
 	   font-size: clamp(16px, 4vw, 22px) !important;
 	   line-height: 1.8 !important;
 	   letter-spacing: 0.08em !important;
 	   padding: 14px !important;
	
	    background-size: 2.2em 2.2em !important;
 	   background-position: 0.4em 0.2em !important;

	    word-break: keep-all !important;
 	   overflow-wrap: break-word !important;
        }
        @media (min-width: 1024px) {
            #modal-text.kakdugi-notebook {
                font-size: 20px !important;
                line-height: 36px !important;
                letter-spacing: 16px !important;
                padding: 14px 12px !important;
                background-size: 36px 36px !important;
                background-position: 8px 4px !important;
            }
        }

        .retro-stamp {
            border: 3px dashed #ef4444;
            color: #ef4444;
            transform: rotate(-5deg);
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body class="p-3 md:p-6 flex flex-col items-center min-h-screen">

    <div id="login-section" class="w-full max-w-md retro-paper rounded-2xl p-8 shadow-2xl text-center my-auto">
        <div class="border-4 border-double border-amber-800 p-4 rounded-xl bg-yellow-50 bg-opacity-50">
            <h1 class="text-5xl font-bold text-amber-900 mb-1">여름방학</h1>
            <h2 class="text-4xl font-bold text-amber-800 mb-6">🎨 그림일기장 🎨</h2>
            <p class="text-lg text-amber-700 font-bold mb-4">제 ○학년 ○반 이름표를 적어주세요</p>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="이름 홍 길 동" value="홍길동" class="w-full border-b-4 border-amber-800 bg-transparent text-2xl text-center focus:outline-none placeholder-amber-600 font-bold tracking-widest">
                <button onclick="handleLogin()" class="w-full bg-red-600 hover:bg-red-700 text-white text-2xl font-bold py-3 rounded-xl shadow-md transition duration-200 border-2 border-white">일기장 펼치기 📖</button>
            </div>
            <p class="text-sm text-amber-600 mt-6 font-bold">교육부 검인정 (주)몽글출판사</p>
        </div>
    </div>

    <div id="main-app" class="w-full max-w-6xl hidden flex flex-col lg:flex-row gap-6 items-stretch">
        
        <div class="w-full lg:w-1/2 retro-paper rounded-3xl p-5 shadow-2xl flex flex-col">
            <div class="grid grid-cols-3 gap-2 border-2 border-amber-900 bg-amber-100 bg-opacity-50 text-xl font-bold text-center mb-4 rounded-lg overflow-hidden">
                <div class="border-r-2 border-amber-900 p-2 text-amber-900" id="current-date-display">2026년 05월 26일</div>
                <div class="border-r-2 border-amber-900 p-2 text-amber-900">요일: 화요일</div>
                <div class="p-1 flex items-center justify-center bg-white">
                    <span class="mr-1 text-sm text-amber-900">날씨:</span>
                    <select id="weather" class="bg-transparent text-xl font-bold focus:outline-none cursor-pointer">
                        <option value="☀️">☀️ 맑음</option>
                        <option value="☁️">☁️ 흐림</option>
                        <option value="☔">☔ 비옴</option>
                        <option value="⚡">⚡ 천둥</option>
                        <option value="☃️">☃️ 눈옴</option>
                    </select>
                </div>
            </div>

            <div class="flex w-full mb-2 border-2 border-amber-800 rounded-lg overflow-hidden text-lg font-bold">
                <button id="tab-photo-btn" onclick="switchUploadMethod('photo')" class="w-1/2 py-2 bg-amber-100 text-amber-950 transition-colors">📸 사진 첨부하기</button>
                <button id="tab-draw-btn" onclick="switchUploadMethod('draw')" class="w-1/2 py-2 bg-amber-700 text-white transition-colors">✏️ 직접 그림그리기</button>
            </div>

            <div class="border-4 border-solid border-amber-900 bg-white h-64 flex flex-col items-center justify-center relative overflow-hidden mb-4 shadow-inner rounded-md">
                
                <div id="photo-upload-container" class="absolute inset-0 flex flex-col items-center justify-center">
                    <input type="file" id="image-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(event)">
                    <div id="upload-placeholder" class="text-center text-gray-400 p-4">
                        <span class="text-5xl block mb-1">📷</span>
                        <p class="text-lg font-bold">여기를 눌러 폰카 사진이나<br>앨범 이미지를 올려주세요</p>
                    </div>
                </div>

                <div id="drawing-board-container" class="absolute inset-0 hidden flex flex-col bg-white">
                    <div class="flex items-center justify-between p-1 bg-amber-50 border-b border-amber-900 z-10">
                        <div class="flex space-x-1 items-center">
                            <input type="color" id="brush-color" value="#000000" class="w-8 h-6 border cursor-pointer">
                            <select id="brush-size" class="text-sm font-bold border border-gray-400 rounded">
                                <option value="3">✏️ 가늘게</option>
                                <option value="6" selected>🖌️ 보통</option>
                                <option value="12">🖍️ 두껍게</option>
                            </select>
                        </div>
                        <button onclick="clearCanvas()" class="px-2 py-0.5 bg-red-100 hover:bg-red-200 text-red-700 border border-red-400 rounded text-sm font-bold">🧼 전부 지우기</button>
                    </div>
                    <canvas id="paintCanvas" class="w-full flex-grow cursor-crosshair touch-none"></canvas>
                </div>

                <img id="image-preview" class="w-full h-full object-contain hidden pointer-events-none z-20 bg-white" alt="최종그림">
                
                <button id="reset-media-btn" onclick="resetMediaSelection()" class="absolute bottom-2 right-2 hidden z-30 px-3 py-1 bg-gray-800 text-white text-sm font-bold rounded-lg opacity-80 hover:opacity-100">다시 고르기 ↺</button>
            </div>

            <textarea id="diary-text" rows="5" placeholder="오늘 하루는 무엇을 하고 놀았는지 깍두기 칸에 차근차근 적어봅시다." class="w-full bg-white border-2 border-amber-900 rounded-lg shadow-inner focus:outline-none resize-none kakdugi-notebook flex-grow" style="height: 200px;"></textarea>

            <button onclick="saveDiary()" class="mt-4 bg-red-600 hover:bg-red-700 text-white text-2xl font-bold py-2 rounded-xl shadow-lg transition duration-200 border-2 border-white tracking-wider">💮 참 잘했어요 도장 찍기</button>
        </div>

        <div class="w-full lg:w-1/2 retro-paper rounded-3xl p-5 shadow-2xl flex flex-col justify-between bg-yellow-50 bg-opacity-30">
            <div>
                <div class="flex justify-between items-center border-b-4 border-amber-900 pb-2 mb-4">
                    <button onclick="changeMonth(-1)" class="text-2xl font-bold text-amber-900 hover:scale-120 px-2">◀</button>
                    <h2 class="text-xl sm:text-2xl md:text-3xl font-bold text-amber-900 tracking-normal sm:tracking-widest whitespace-nowrap text-center flex-grow" id="calendar-month-year">2026년 5월 월간 검사표</h2>
                    <button onclick="changeMonth(1)" class="text-2xl font-bold text-amber-900 hover:scale-120 px-2">▶</button>
                </div>

                <div class="grid grid-cols-7 text-center font-bold text-lg mb-2 text-amber-950 bg-amber-200 bg-opacity-50 py-1 rounded">
                    <div class="text-red-600">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-600">토</div>
                </div>

                <div class="grid grid-cols-7 gap-2" id="calendar-days"></div>
            </div>
            
            <div class="mt-4 p-3 bg-white border-2 border-amber-800 rounded-xl text-center font-bold text-amber-900 text-sm">
                🎉 축하합니다! 이제 작성하신 일기는 내 개인 클라우드 서버 데이터베이스에 안전하게 영구 저장됩니다.
            </div>
        </div>
    </div>

    <div id="diary-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-50">
        <div class="retro-paper rounded-3xl p-6 max-w-md w-full relative">
            <button
		    onclick="deleteDiary()"
		    class="absolute top-3 left-4 bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded-lg font-bold text-sm">
		    삭제
		</button>
            <div class="flex justify-between items-center border-b-2 border-amber-900 pb-2 mb-4 font-bold text-amber-950 text-xl">
                <h3 id="modal-date">날짜</h3>
                <span id="modal-weather" class="text-2xl">☀️</span>
            </div>
            
            <div class="bg-white p-2 border-2 border-gray-300 rounded-xl mb-4">
                <img id="modal-image" class="w-full h-48 object-contain rounded-lg bg-gray-50" src="" alt="그림">
            </div>
            
            <div class="relative">
                <p id="modal-text" class="bg-white rounded-xl border-2 border-amber-900 shadow-inner whitespace-pre-wrap kakdugi-notebook" style="height: 160px;"></p>
                <div class="absolute -bottom-4 -right-2 retro-stamp rounded-full p-2 text-center w-24 h-24 flex flex-col items-center justify-center font-black text-xs border-double">
                    <span class="text-lg">💮</span>
                    참잘했어요
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★ [중요] 내 Supabase 정보 입력 칸
        const SUPABASE_URL = "https://llkgofkkhuictscodsll.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsa2dvZmtraHVpY3RzY29kc2xsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTA0NDIsImV4cCI6MjA5NTM2NjQ0Mn0.DKymADB196pxaqQnrv6HDW7Ek6xItCWqkrAOOI8xT_s"; 

        // Supabase 초기화 연결 엔진
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentDate = new Date();
        let selectedImageData = ""; 
        let currentMode = "photo"; 
        let diaryDatabase = {}; // 로컬 캐시용 객체
        let childName = "홍길동";
	let selectedDiaryDate = getFormattedDate(new Date());
	let isDirty = false;
	let openedModalDate = "";

        let canvas, ctx, isDrawing = false;

        function handleLogin() {
            const name = document.getElementById('username').value.trim();
            if(!name) return alert('어린이 이름을 입력해 주세요!');
            childName = name;
            
            document.getElementById('login-section').style.display = 'none';
            const mainApp = document.getElementById('main-app');
            mainApp.style.display = 'flex';
            mainApp.classList.remove('hidden');
            
            initApp();
        }

        async function initApp() {
             setupCanvas();

	    document.getElementById('diary-text')
	        .addEventListener('input', () => {
	            isDirty = true;
	        });

	    document.getElementById('weather')
	        .addEventListener('change', () => {
	            isDirty = true;
	        });

	    await loadDiariesFromServer();

	    renderTodayForm();
	    renderCalendar();
        }

        // 서버(Supabase)에서 누적된 전체 일기 원격 로드 함수
        async function loadDiariesFromServer() {
            try {
                const { data, error } = await _supabase
                    .from('diary_entries')
                    .select('*');
                
                if (error) throw error;
                
                // 받아온 리스트 데이터를 달력 구조에 맞게 맵핑 변환
                diaryDatabase = {};
                if(data) {
                    data.forEach(item => {
                        diaryDatabase[item.diary_date] = {
                            text: item.diary_text,
                            weather: item.weather,
                            image: item.image_data,
                            name: item.username
                        };
                    });
                }
            } catch (err) {
                console.error("서버 데이터 로드 실패:", err.message);
            }
        }

        function switchUploadMethod(mode) {
            currentMode = mode;
            const photoTab = document.getElementById('tab-photo-btn');
            const drawTab = document.getElementById('tab-draw-btn');
            const photoContainer = document.getElementById('photo-upload-container');
            const drawContainer = document.getElementById('drawing-board-container');

            if(mode === 'photo') {
                photoTab.className = "w-1/2 py-2 bg-amber-700 text-white transition-colors";
                drawTab.className = "w-1/2 py-2 bg-amber-100 text-amber-950 transition-colors";
                photoContainer.classList.remove('hidden');
                drawContainer.classList.add('hidden');
            } else {
                drawTab.className = "w-1/2 py-2 bg-amber-700 text-white transition-colors";
                photoTab.className = "w-1/2 py-2 bg-amber-100 text-amber-950 transition-colors";
                drawContainer.classList.remove('hidden');
                photoContainer.classList.add('hidden');
                resizeCanvas();
            }
        }

        function setupCanvas() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            canvas.addEventListener('touchstart', startDrawingTouch);
            canvas.addEventListener('touchmove', drawTouch);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - 34;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function clearCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function startDrawing(e) {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!isDrawing) return;
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }

        function startDrawingTouch(e) {
            isDrawing = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
            e.preventDefault();
        }

        function drawTouch(e) {
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        }

        function stopDrawing() { isDrawing = false; }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const compCanvas = document.createElement('canvas');
                        const compCtx = compCanvas.getContext('2d');
                        const max_width = 300;
                        const scale = max_width / img.width;
                        compCanvas.width = max_width;
                        compCanvas.height = img.height * scale;
                        compCtx.drawImage(img, 0, 0, compCanvas.width, compCanvas.height);
                        
                        selectedImageData = compCanvas.toDataURL('image/jpeg', 0.5); 
                        showFinalPreview(selectedImageData);
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function showFinalPreview(dataUrl) {
            const preview = document.getElementById('image-preview');
            preview.src = dataUrl;
            preview.classList.remove('hidden');
            document.getElementById('reset-media-btn').classList.remove('hidden');
        }

        function resetMediaSelection() {
            selectedImageData = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('reset-media-btn').classList.add('hidden');
            document.getElementById('image-input').value = "";
            clearCanvas();
        }

        // ★ 핵심: 작성한 일기를 실시간으로 인터넷 클라우드 DB에 집어넣는 비동기 처리 함수
        async function saveDiary(silent = false) {
            const dateStr = selectedDiaryDate;
            const text = document.getElementById('diary-text').value;
            const weather = document.getElementById('weather').value;

            if(currentMode === 'draw' && !selectedImageData) {
                const thumbCanvas = document.createElement('canvas');
                const thumbCtx = thumbCanvas.getContext('2d');
                thumbCanvas.width = 300;
                thumbCanvas.height = (300 / canvas.width) * canvas.height;
                thumbCtx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
                selectedImageData = thumbCanvas.toDataURL('image/jpeg', 0.5);
            }

            if(!text && !selectedImageData) {
                alert('내용이나 그림을 작성해 주세요!');
                return;
            }

            // [Supabase Upsert 트랜잭션 실행] 기존 날짜가 있으면 덮어쓰고, 없으면 새로 삽입
            try {
                const { error } = await _supabase
                    .from('diary_entries')
                    .upsert({
                        diary_date: dateStr,
                        username: childName,
                        weather: weather,
                        diary_text: text,
                        image_data: selectedImageData
                    }, { onConflict: 'username,diary_date' });

                if (error) throw error;

                if(!silent) {
 				   alert('💮 일기를 잘 썼어요!');
		}
                
                // 로컬 상태 최신화 동기화
                await loadDiariesFromServer();
                renderTodayForm();
                renderCalendar();
            } catch(err) {
                alert('🚨 서버 전송 중 에러가 발생했습니다: ' + err.message);
            }
        }

        function renderTodayForm() {

    	document.getElementById('current-date-display').innerText =
        	`날짜: ${selectedDiaryDate}`;

	    const data = diaryDatabase[selectedDiaryDate];

	    document.getElementById('diary-text').value = "";
	    document.getElementById('weather').value = "☀️";

	    resetMediaSelection();

	    if(data) {

	        document.getElementById('diary-text').value =
            	data.text || "";

	        document.getElementById('weather').value =
	            data.weather || "☀️";

	        if(data.image) {
	            selectedImageData = data.image;
	            showFinalPreview(selectedImageData);
	        }
	    }

	    isDirty = false;
	}

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('calendar-month-year').innerText = `${year}년 ${month + 1}월 방학 검사표`;
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const calendarDays = document.getElementById('calendar-days');
            calendarDays.innerHTML = "";

            for (let i = 0; i < firstDayIndex; i++) {
                calendarDays.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= lastDay; day++) {
                const dayDiv = document.createElement('div');
                const currentKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                dayDiv.style.border = "2px dashed #8b5a2b";
                dayDiv.style.borderRadius = "0.5rem";
                dayDiv.style.padding = "0.25rem";
                dayDiv.style.height = "4.8rem"; 
                dayDiv.style.position = "relative";
                dayDiv.style.overflow = "hidden";
                dayDiv.style.display = "flex";
                dayDiv.style.flexDirection = "column";
                dayDiv.style.justifyContent = "between";
                dayDiv.style.cursor = "pointer";
                dayDiv.style.backgroundColor = "#ffffff";
                
                if(diaryDatabase[currentKey] && diaryDatabase[currentKey].image) {
                    dayDiv.style.backgroundImage = `url(${diaryDatabase[currentKey].image})`;
                    dayDiv.style.backgroundSize = 'cover';
                    dayDiv.style.backgroundPosition = 'center';
                    dayDiv.style.boxShadow = "inset 0 0 0 2000px rgba(255,255,255,0.5)";
                }

                const dayNum = document.createElement('span');
                dayNum.innerText = day;
                dayNum.style.fontWeight = "bold";
                dayNum.style.fontSize = "1.25rem";
                
                const dayOfWeek = new Date(year, month, day).getDay();
                if(dayOfWeek === 0) dayNum.style.color = "#ef4444";
                if(dayOfWeek === 6) dayNum.style.color = "#3b82f6";

                dayDiv.appendChild(dayNum);

                if(diaryDatabase[currentKey]) {
                    const icon = document.createElement('span');
                    icon.innerText = "💮";
                    icon.style.alignSelf = "flex-end";
                    icon.style.fontSize = "1.25rem";
                    dayDiv.appendChild(icon);
                    dayDiv.onclick = (e) => {

			    if(e.detail === 2) {
			        openModal(currentKey);
		        return;
		    }

			    selectDiaryDate(currentKey);
		};

                } else {
                    dayDiv.onclick = () => selectDiaryDate(currentKey);
                }
                calendarDays.appendChild(dayDiv);
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function openModal(key) {
	    openedModalDate = key;
            const data = diaryDatabase[key];
            document.getElementById('modal-date').innerText = `📅 검사일: ${key} (${data.name || '어린이'})`;
            document.getElementById('modal-weather').innerText = `날씨: ${data.weather}`;
            document.getElementById('modal-text').innerText = data.text || "";
            
            const mImg = document.getElementById('modal-image');
            if(data.image) {
                mImg.src = data.image;
                mImg.style.display = 'block';
            } else {
                mImg.style.display = 'none';
            }
            document.getElementById('diary-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('diary-modal').style.display = 'none';
        }

        function getFormattedDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

	async function selectDiaryDate(newDate) {

  	  if(isDirty) {
	
	        const shouldSave = confirm(
	            "입력중인 일기를 저장할까요?"
	        );
	
	        if(shouldSave) {
	            await saveDiary(true);
	        }
	    }
	
	    selectedDiaryDate = newDate;
	
	    renderTodayForm();
	}

	async function deleteDiary() {

    if(!confirm('정말 이 일기를 삭제할까요?')) {
        return;
    }

    try {

        const { error } = await _supabase
            .from('diary_entries')
            .delete()
            .eq('diary_date', openedModalDate);

        if(error) throw error;

        delete diaryDatabase[openedModalDate];

        closeModal();

        renderCalendar();

        if(selectedDiaryDate === openedModalDate) {
            renderTodayForm();
        }

        alert('🗑️ 일기가 삭제되었습니다.');

    } catch(err) {

        alert('삭제 실패: ' + err.message);
    }
}
    </script>
