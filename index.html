    <script>
        const SUPABASE_URL = "https://llkgofkkhuictscodsll.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsa2dvZmtraHVpY3RzY29kc2xsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTA0NDIsImV4cCI6MjA5NTM2NjQ0Mn0.DKymADB196pxaqQnrv6HDW7Ek6xItCWqkrAOOI8xT_s"; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentDate = new Date();
        let selectedImageData = ""; 
        let currentMode = "photo"; 
        let diaryDatabase = {}; 
        let childName = ""; 
        let selectedDiaryDate = "";
        let isDirty = false;
        let openedModalDate = "";
        let autoSaveTimer = null;
        let soundEnabled = true;
        let communityChannel = null;

        const stampSound = new Audio('stamp.mp3');
        let canvas, ctx, isDrawing = false;

        // ==========================================
        // 1 & 3. 닉네임 격리화 및 캘린더 날짜 초기화 엔진 보완
        // ==========================================
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if(!email || !password) return alert('이메일과 비밀번호를 모두 입력해 주세요! 👦');
            
            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                if (error) throw error;

                const userEmail = data.user.email;
                const userId = data.user.id; // 계정 고유 ID 추출
                localStorage.setItem('lastLoggedInUser', userEmail); 
                saveUserName(userEmail);

                // ✅ 타 계정 오염 방지: 오직 현재 로그인한 계정 고유의 메타데이터만 신뢰
                let savedUsername = data.user.user_metadata?.nickname || '';

                // 타 계정 닉네임 혼선 차단: 계정 이메일이 포함된 고유 키값으로 로컬 백업 확인
                if (!savedUsername) {
                    const oldNickname = localStorage.getItem(`diary_username_${userEmail}`);
                    if (oldNickname && oldNickname.trim()) {
                        savedUsername = oldNickname.trim();
                        await _supabase.auth.updateUser({ data: { nickname: savedUsername } });
                    }
                }

                // 닉네임이 아예 없는 신규 유저인 경우 독립 공간 부여
                if (!savedUsername || savedUsername.trim() === '') {
                    while (!savedUsername || savedUsername.trim() === '') {
                        savedUsername = prompt("🎨 환영합니다! 일기장에 표시될 닉네임을 정해주세요!");
                        if (savedUsername === null) {
                            alert("일기를 작성하고 친구들에게 보여주려면 닉네임이 꼭 필요해요! 👦");
                            savedUsername = '';
                            continue;
                        }
                        savedUsername = savedUsername.trim();
                    }
                    // Supabase Auth Meta 데이터베이스에 유일 독립 키로 닉네임 바인딩
                    await _supabase.auth.updateUser({ data: { nickname: savedUsername } });
                    alert(`반갑습니다, ${savedUsername}님! 오늘 하루 일기를 써봅시다. ✨`);
                }

                // 전역 안전 세션 할당
                childName = savedUsername;
                diaryDatabase = {};
                
                // ✅ [3번 요청 해결] 로그인 시 무조건 오늘(Today) 날짜 기준으로 달력과 선택일을 강제 초기화
                currentDate = new Date(); 
                selectedDiaryDate = getFormattedDate(new Date());
                
                document.getElementById('login-section').style.display = 'none';
                const mainApp = document.getElementById('main-app');
                mainApp.style.display = 'flex';
                mainApp.classList.remove('hidden');
                
                initApp();
            } catch (err) {
                console.error("로그인 에러:", err.message);
                alert('🚨 로그인에 실패했습니다: ' + err.message);
            }
        }
        // Supabase 회원가입 기능 엔진 
            async function handleSignUp() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) return showSignupModal('error', '가입할 이메일과 비밀번호를 채워주세요!');
            if (password.length < 6) return showSignupModal('error', '비밀번호는 최소 6자리 이상이어야 합니다!');

            try {
                // ✅ 인증 완료 후 이 페이지로 다시 돌아오도록 redirectTo 설정
                const redirectTo = window.location.href.split('?')[0].split('#')[0] + '?signup_confirmed=1';
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { emailRedirectTo: redirectTo }
                });
                if (error) throw error;
                showSignupModal('success', email);
            } catch (err) {
                showSignupModal('error', err.message);
            }
    }

        async function initApp() {
            setupCanvas();
            const savedSound = localStorage.getItem('soundEnabled');
            if(savedSound !== null) {
                soundEnabled = savedSound === 'true';
            }
            document.getElementById('sound-toggle').innerText = soundEnabled ? '🔊' : '🔇';
            
            // [보완] 요소 존재유무 예외 필터링 추가
            const diaryInput = document.getElementById('diary-text');
            if(diaryInput) {
                diaryInput.addEventListener('input', () => {
                    isDirty = true;
                    clearTimeout(autoSaveTimer);
                    if(diaryInput.value.length > 5) {
                        autoSaveTimer = setTimeout(() => { saveDiary(true); }, 3000);
                    }
                });
            }

            document.getElementById('weather').addEventListener('change', () => { isDirty = true; });
            await loadDiariesFromServer();
            renderTodayForm();
            renderCalendar();
            calculateStreak();
            setupRealtimeSync(); 
        }

        async function loadDiariesFromServer() {
            try {
                const { data, error } = await _supabase
                    .from('diary_entries')
                    .select('*')
                    .eq('username', childName);
                if (error) throw error;
                diaryDatabase = {};
                if(data) {
                    data.forEach(item => {
                        diaryDatabase[item.diary_date] = {
                            text: item.diary_text,
                            weather: item.weather,
                            image: item.image_data,
                            name: item.username
                        };
                    });
                }
            } catch (err) {
                console.error("서버 데이터 로드 실패:", err.message);
            }
        }

            function setupRealtimeSync() {
            if (communityChannel) {
                _supabase.removeChannel(communityChannel);
            }

        function setupCanvas() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            canvas.addEventListener('touchstart', startDrawingTouch);
            canvas.addEventListener('touchmove', drawTouch);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - 34;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function clearCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function startDrawing(e) { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); }
        function draw(e) {
            if (!isDrawing) return;
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }
        function startDrawingTouch(e) {
            isDrawing = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
            e.preventDefault();
        }
        function drawTouch(e) {
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        }
        function stopDrawing() { isDrawing = false; }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const compCanvas = document.createElement('canvas');
                        const compCtx = compCanvas.getContext('2d');
                        const max_width = 500; 
                        const scale = max_width / img.width;
                        compCanvas.width = max_width;
                        compCanvas.height = img.height * scale;
                        compCtx.drawImage(img, 0, 0, compCanvas.width, compCanvas.height);
                        
                        selectedImageData = compCanvas.toDataURL('image/jpeg', 0.7); 
                        showFinalPreview(selectedImageData);
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function showFinalPreview(dataUrl) {
            const preview = document.getElementById('image-preview');
            preview.src = dataUrl;
            preview.classList.remove('hidden');
            document.getElementById('reset-media-btn').classList.remove('hidden');
        }

        function resetMediaSelection() {
            selectedImageData = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('reset-media-btn').classList.add('hidden');
            document.getElementById('image-input').value = "";
            if (canvas) clearCanvas();
        }

                        dayDiv.appendChild(line);
                    }

                    const icon = document.createElement('span');
                    icon.innerText = "💮";
                    icon.style.alignSelf = "flex-end";
                    icon.style.fontSize = "1.25rem";
                    dayDiv.appendChild(icon);

                    dayDiv.onclick = () => { openModal(currentKey); };
                }
                else {
                    dayDiv.onclick = () => { selectDiaryDate(currentKey); };
                }

                calendarDays.appendChild(dayDiv);
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function openModal(key) {
            openedModalDate = key;
            const data = diaryDatabase[key];
            document.getElementById('modal-date').innerText = `📅 검사일: ${key}`;
            document.getElementById('modal-weather').innerText = `날씨: ${data.weather}`;
            document.getElementById('modal-text').innerText = data.text || "";
            const mImg = document.getElementById('modal-image');
            if(data.image) {
                mImg.src = data.image;
                mImg.style.display = 'block';
            } else {
                mImg.style.display = 'none';
            }
            document.getElementById('diary-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('diary-modal').style.display = 'none';
        }

        function getFormattedDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function selectDiaryDate(newDate) {
            if(isDirty) {
                const shouldSave = confirm("입력중인 일기를 저장할까요?");
                if(shouldSave) { await saveDiary(true); }
            }
            selectedDiaryDate = newDate;
            renderTodayForm();

            const diaryInput = document.getElementById('diary-text');
            diaryInput.focus();
            setTimeout(() => {
                diaryInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        async function deleteDiary() {
            if(!confirm('정말 이 일기를 삭제할까요?')) return;
            try {
                const { error } = await _supabase
                    .from('diary_entries')
                    .delete()
                    .eq('diary_date', openedModalDate)
                    .eq('username', childName);

                if(error) throw error;

                delete diaryDatabase[openedModalDate];
                closeModal();
                renderCalendar();
                if(selectedDiaryDate === openedModalDate) {
                    renderTodayForm();
                }
                alert('🗑️ 일기가 삭제되었습니다.');
            } catch(err) {
                alert('삭제 실패: ' + err.message);
            }
        }

        async function goToHome() {
            if (isDirty) {
                const shouldSave = confirm("작성중인 일기를 저장할까요?");
                if (shouldSave) { await saveDiary(true); }
            }

            const confirmMove = confirm("로그아웃하고 첫 화면으로 돌아갈까요?");
            if (!confirmMove) return;

            await _supabase.auth.signOut();

            if(communityChannel) {
                _supabase.removeChannel(communityChannel);
                communityChannel = null;
            }

            document.getElementById('main-app').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            renderUserList();
        }

        function saveUserName(name) {
            let users = JSON.parse(localStorage.getItem('diaryUsers') || '[]');
            if (!users.includes(name)) { users.unshift(name); }
            users = users.slice(0, 5);
            localStorage.setItem('diaryUsers', JSON.stringify(users));
            renderUserList();
        }

        function renderUserList() {
            const container = document.getElementById('recent-users');
            if (!container) return;

            const users = JSON.parse(localStorage.getItem('diaryUsers') || '[]');
            container.innerHTML = "";
            users.forEach(user => {
                const btn = document.createElement('button');
                btn.innerText = `🧒 ${user.split('@')[0]}`; 
                btn.className = "px-3 py-1 bg-amber-100 hover:bg-amber-200 rounded-lg border border-amber-700 text-sm font-bold cursor-pointer";
              btn.onclick = () => {
                document.getElementById('login-email').value = user;
                document.getElementById('login-password').value = ''; // 비밀번호 초기화
                document.getElementById('login-password').focus();
            };
                container.appendChild(btn);
            });
        }

        async function editDiary() {
            closeModal();
            await selectDiaryDate(openedModalDate);
            document.getElementById('diary-text').focus();
        }

        function calculateStreak() {
            const keys = Object.keys(diaryDatabase).sort();
            let streak = 0;
            let today = new Date();
            today.setHours(0,0,0,0);
            for(let i = 0; i < 365; i++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() - i);
                const key = getFormattedDate(checkDate);

                if(keys.includes(key)) { streak++; } 
                else { break; }
            }
            document.getElementById('streak-box').innerText = `💮 ${streak}일 연속 그림일기 작성중!`;
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('soundEnabled', soundEnabled);
            document.getElementById('sound-toggle').innerText = soundEnabled ? '🔊' : '🔇';
        }

        let bgmOn = false;
        function toggleYouTubeBGM() {
            const iframe = document.getElementById('youtube-player');
            const btn = document.getElementById('bgm-btn');
            const rawUrl = "https://youtu.be/KEu5YL1VzEg?si=gNZ5AYJziHbA6tJi&t=15";
            let videoId = "KEu5YL1VzEg";
            if(rawUrl.includes("youtu.be/")) {
                videoId = rawUrl.split("youtu.be/")[1].split("?")[0];
            }

            if(!bgmOn) {
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}&playsinline=1&enablejsapi=1`;
                bgmOn = true;
                btn.innerText = "⏸ 음악 끄기";
                btn.classList.replace('bg-red-500', 'bg-gray-600');
            } else {
                iframe.src = "";
                bgmOn = false;
                btn.innerText = "🎵 음악 재생";
                btn.classList.replace('bg-gray-600', 'bg-red-500');
            }
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('install-btn');
            if(installBtn) installBtn.classList.remove('hidden');
        });
        document.getElementById('install-btn')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
            }
        });

       // [교정 좌표: 맨 아래 DOMContentLoaded 실행 플러그 및 웹 푸시 허용 자동화]
        window.addEventListener('DOMContentLoaded', () => {
            renderUserList();
            const autoUser = localStorage.getItem('lastLoggedInUser');
            if (autoUser) {
                const emailInput = document.getElementById('login-email');
                if(emailInput) emailInput.value = autoUser;

                const nicknameStorageKey = `diary_username_${autoUser}`;
                const autoUsername = localStorage.getItem(nicknameStorageKey);
                if (autoUsername) {
                    childName = autoUsername;
                }
            }
            // ✅ 이메일 인증 완료 후 리다이렉트 감지
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('signup_confirmed') === '1') {
                _supabase.auth.getSession().then(async ({ data }) => {
                    if (data.session) await _supabase.auth.signOut();
                });
                window.history.replaceState({}, document.title, window.location.pathname);
                showSignupModal('verified', '');
            }

            // ✅ 비밀번호 재설정 링크 클릭 후 처리
            _supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    const newPassword = prompt('🔑 새 비밀번호를 입력해 주세요 (6자리 이상):');
                    if (newPassword && newPassword.length >= 6) {
                        const { error } = await _supabase.auth.updateUser({ password: newPassword });
                        if (!error) {
                            alert('✅ 비밀번호가 변경되었어요! 새 비밀번호로 로그인해 주세요.');
                            await _supabase.auth.signOut();
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                }
});
        });

        // ✅ 회원가입 모달 표시/숨김 함수
        function showSignupModal(type, data) {
            const modal = document.getElementById('signup-modal');
            const icon = document.getElementById('signup-modal-icon');
            const title = document.getElementById('signup-modal-title');
            const message = document.getElementById('signup-modal-message');
            
            if (type === 'success') {
                icon.innerText = '✉️';
                title.innerText = '이메일을 확인해 주세요!';
                message.innerText = `${data} 으로 인증 메일을 보냈어요.\n받은 편지함에서 링크를 눌러 회원가입을 완료해 주세요! 📬`;
            } else if (type === 'verified') {
                icon.innerText = '🎉';
                title.innerText = '회원가입 완료!';
                message.innerText = '이메일 인증이 완료되었어요! 로그인 버튼을 눌러 몽글일기를 시작해 보세요! 🎨';
            } else {
                icon.innerText = '⚠️';
                title.innerText = '잠깐!';
                message.innerText = data;
            }
            modal.style.display = 'flex';
        }

        function closeSignupModal() {
            document.getElementById('signup-modal').style.display = 'none';
        }

        // ✅ 계정 설정 모달 함수들
        function openSettingsModal() {
            document.getElementById('current-nickname-display').innerText = childName;
            document.getElementById('new-nickname-input').value = '';
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        async function updateNickname() {
            const newNickname = document.getElementById('new-nickname-input').value.trim();
            if (!newNickname) return alert('새 닉네임을 입력해 주세요!');
            if (!confirm(`닉네임을 '${newNickname}'(으)로 변경할까요?\n기존에 쓴 일기의 이름도 함께 바뀝니다.`)) return;

            try {
                const oldNickname = childName;
                // 1. Supabase 계정 메타데이터 업데이트
                const { error: authError } = await _supabase.auth.updateUser({ data: { nickname: newNickname } });
                if (authError) throw authError;
                
                // 2. 기존 일기 데이터의 username도 업데이트
                const { error: dbError } = await _supabase
                    .from('diary_entries')
                    .update({ username: newNickname })
                    .eq('username', oldNickname);
                if (dbError) throw dbError;
                
                childName = newNickname;
                await loadDiariesFromServer();
                renderCalendar();
                alert(`✅ 닉네임이 '${newNickname}'(으)로 변경되었어요!`);
                closeSettingsModal();
            } catch (err) {
                alert('닉네임 변경 실패: ' + err.message);
            }
        }

        async function sendPasswordReset() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) return alert('로그인 정보를 찾을 수 없어요.');
                const redirectTo = window.location.href.split('?')[0].split('#')[0];
                const { error } = await _supabase.auth.resetPasswordForEmail(user.email, { redirectTo });
                if (error) throw error;
                alert(`📧 ${user.email}로 비밀번호 재설정 링크를 보냈어요!\n메일함을 확인해 주세요.`);
            } catch (err) {
                alert('비밀번호 재설정 실패: ' + err.message);
            }
        }
    

            // ✅ 친구 일기 팝업 함수
        function openCommunityModal(item) {
            document.getElementById('community-modal-name').innerText = `🧒 ${item.username}의 일기`;
            document.getElementById('community-modal-date').innerText = `📅 ${item.diary_date}`;
            document.getElementById('community-modal-weather').innerText = item.weather || '☀️';
            document.getElementById('community-modal-text').innerText = item.diary_text || '';
            
            const img = document.getElementById('community-modal-image');
            if (item.image_data) {
                img.src = item.image_data;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
            document.getElementById('community-modal').style.display = 'flex';
        }

        function closeCommunityModal() {
            document.getElementById('community-modal').style.display = 'none';
        }

        // ==========================================
        // 4. 엔터키 누르면 로그인 실행 기능 추가
        // ==========================================
        function checkEnterLogin(event) {
            if (event.key === 'Enter') {
                handleLogin();
            }
        }
    </script>
    <!-- ✅ 회원가입 안내 모달 (새로 추가) -->
    <div id="signup-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="retro-paper rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div id="signup-modal-icon" class="text-6xl mb-4">✉️</div>
            <h2 id="signup-modal-title" class="text-3xl font-bold text-amber-900 mb-3">이메일을 확인해 주세요!</h2>
            <p id="signup-modal-message" class="text-amber-800 font-bold mb-6 leading-relaxed text-lg"></p>
            <button onclick="closeSignupModal()" class="w-full bg-amber-700 hover:bg-amber-800 text-white text-xl font-bold py-3 rounded-xl cursor-pointer border-2 border-white">확인 ✓</button>
        </div>
    </div>
    <!-- ✅ 계정 설정 모달 (새로 추가) -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="retro-paper rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-amber-900">⚙️ 계정 설정</h2>
                <button onclick="closeSettingsModal()" class="text-4xl text-amber-900 font-bold leading-none cursor-pointer">×</button>
            </div>
            
            <!-- 닉네임 변경 -->
            <div class="bg-amber-50 border-2 border-amber-800 rounded-xl p-4 mb-4">
                <p class="text-amber-900 font-bold mb-1">✏️ 닉네임 변경</p>
                <p class="text-sm text-amber-700 mb-3">현재: <span id="current-nickname-display" class="font-black text-amber-900"></span></p>
                <input type="text" id="new-nickname-input" placeholder="새 닉네임 입력" maxlength="12"
                    class="w-full border-b-2 border-amber-800 bg-transparent text-lg font-bold focus:outline-none placeholder-amber-400 mb-3">
                <button onclick="updateNickname()" 
                    class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-2 rounded-lg cursor-pointer border-2 border-white">변경하기</button>
            </div>
            
            <!-- 비밀번호 재설정 -->
            <div class="bg-amber-50 border-2 border-amber-800 rounded-xl p-4">
                <p class="text-amber-900 font-bold mb-1">🔑 비밀번호 재설정</p>
                <p class="text-sm text-amber-700 mb-3">가입한 이메일로 재설정 링크를 보내드려요.</p>
                <button onclick="sendPasswordReset()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg cursor-pointer border-2 border-white">📧 재설정 이메일 받기</button>
            </div>
        </div>
    </div>

    <!-- ✅ 친구 일기 상세보기 모달 (새로 추가) -->
    <div id="community-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-50">
        <div class="retro-paper rounded-3xl p-6 max-w-md w-full relative">
            <div class="flex justify-end mb-2">
                <button onclick="closeCommunityModal()" class="text-4xl leading-none font-bold text-amber-900 hover:scale-110 transition-transform cursor-pointer">×</button>
            </div>
            <div class="flex justify-between items-center border-b-2 border-amber-900 pb-2 mb-4 font-bold text-amber-950">
                <div>
                    <p id="community-modal-name" class="text-base text-amber-700 font-bold"></p>
                    <p id="community-modal-date" class="text-xl"></p>
                </div>
                <span id="community-modal-weather" class="text-3xl"></span>
            </div>
            <div class="bg-white p-2 border-2 border-gray-300 rounded-xl mb-4">
                <img id="community-modal-image" class="w-full h-48 object-contain rounded-lg bg-gray-50" src="" alt="그림">
            </div>
            <div class="relative">
                <p id="community-modal-text" class="bg-white rounded-xl border-2 border-amber-900 shadow-inner whitespace-pre-wrap kakdugi-notebook overflow-y-auto" style="height: 160px;"></p>
                <div class="absolute -bottom-4 -right-2 retro-stamp rounded-full p-2 text-center w-24 h-24 flex flex-col items-center justify-center font-black text-xs border-double">
                    <span class="text-lg">💮</span>참잘했어요
                </div>
            </div>
        </div>
    </div>

</body>
