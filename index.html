<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 몽글이 그림일기장 🎨</title>
    <!-- Tailwind CSS 및 외부 폰트 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <!-- 레트로 스타일시트 연결 -->
    <link rel="stylesheet" href="style.css">
    <!-- Supabase CDN 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-stone-200 flex justify-center items-center min-h-screen p-4 overflow-x-hidden">

    <!-- 1단계 인증 포함 로그인 섹션 -->
    <div id="login-section" class="w-full max-w-md retro-paper rounded-2xl p-8 shadow-2xl text-center my-auto">
        <div class="border-4 border-double border-amber-800 p-4 rounded-xl bg-yellow-50 bg-opacity-50">
            <h1 class="text-5xl font-bold text-amber-900 mb-1">여름방학</h1>
            <h2 class="text-4xl font-bold text-amber-800 mb-6">🎨 그림일기장 🎨</h2>
            
            <div class="space-y-3 text-left mb-4">
                <div>
                    <label class="block text-amber-900 font-bold mb-1">이메일 주소</label>
                    <input type="email" id="auth-email" placeholder="example@email.com" class="w-full p-2 border-2 border-amber-800 bg-white rounded-lg font-bold focus:outline-none">
                </div>
                <div>
                    <label class="block text-amber-900 font-bold mb-1">비밀번호</label>
                    <input type="password" id="auth-password" placeholder="******" class="w-full p-2 border-2 border-amber-800 bg-white rounded-lg font-bold focus:outline-none">
                </div>
                <div>
                    <label class="block text-amber-900 font-bold mb-1">일기장에 표시될 이름 (회원가입 시 필수)</label>
                    <input type="text" id="username" placeholder="몽글이" class="w-full p-2 border-2 border-amber-800 bg-white rounded-lg font-bold focus:outline-none">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-3">
                <button onclick="handleLogin()" class="bg-red-600 hover:bg-red-700 text-white text-xl font-bold py-3 rounded-xl shadow-md border-2 border-white cursor-pointer">로그인 📖</button>
                <button onclick="handleSignUp()" class="bg-amber-700 hover:bg-amber-800 text-white text-xl font-bold py-3 rounded-xl shadow-md border-2 border-white cursor-pointer">회원가입 🎉</button>
            </div>

            <button onclick="handleKakaoLogin()" class="w-full bg-yellow-300 hover:bg-yellow-400 text-yellow-950 text-xl font-bold py-3 rounded-xl shadow-md border-2 border-amber-800 flex items-center justify-center gap-2 cursor-pointer">
                <span>💬</span> 카카오로 시작하기
            </button>
            
            <p class="text-sm text-amber-600 mt-6 font-bold">교육부 검인정 (주)몽글출판사</p>
            <button id="bgm-btn" onclick="toggleYouTubeBGM()" class="mt-3 w-full bg-red-500 hover:bg-red-600 text-white text-xl font-bold py-2 rounded-xl border-2 border-white cursor-pointer">🎵 음악 재생</button>
        </div>
    </div>

    <!-- 메인 일기장 앱 (로그인 전에는 hidden) -->
    <div id="main-app" class="hidden w-full max-w-6xl retro-book shadow-2xl rounded-3xl p-6 flex-col md:flex-row gap-6 relative">
        <!-- [왼쪽 페이지: 일기 작성 및 보기] -->
        <div class="w-full md:w-1/2 flex flex-col justify-between border-b-4 md:border-b-0 md:border-r-4 border-dashed border-amber-800 pb-6 md:pb-0 md:pr-6">
            <div>
                <div class="flex justify-between items-center mb-4 bg-amber-100 p-2 rounded-xl border-2 border-amber-800">
                    <div class="text-2xl font-bold text-amber-900" id="current-user-display">🧑‍🎨 작성자: 로딩 중...</div>
                    <button onclick="handleLogout()" class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg text-sm border-2 border-white cursor-pointer">로그아웃</button>
                </div>

                <div class="flex flex-wrap gap-2 items-center mb-4 text-amber-950 font-bold text-xl">
                    <input type="date" id="diary-date" class="border-2 border-amber-800 p-1.5 bg-white rounded-lg focus:outline-none">
                    <select id="diary-weather" class="border-2 border-amber-800 p-1.5 bg-white rounded-lg focus:outline-none">
                        <option value="☀️ 맑음">☀️ 맑음</option>
                        <option value="☁️ 흐림">☁️ 흐림</option>
                        <option value="🌧️ 비">🌧️ 비</option>
                        <option value="☃️ 눈">☃️ 눈</option>
                    </select>
                </div>

                <!-- 그림 영역 -->
                <div class="w-full aspect-[4/3] border-4 border-amber-800 bg-white rounded-xl relative shadow-inner overflow-hidden flex flex-col items-center justify-center group">
                    <img id="diary-image" class="w-full h-full object-cover hidden" alt="일기 그림">
                    <div id="image-placeholder" class="text-center p-4">
                        <span class="text-6xl text-amber-700 block mb-2">🎨</span>
                        <p class="text-amber-900 font-bold text-lg">오늘 하루를 표현할<br>사진을 업로드해 주세요!</p>
                    </div>
                    <input type="file" id="image-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <button id="remove-img-btn" onclick="removeImage(event)" class="absolute top-2 right-2 bg-red-600 text-white font-bold p-1.5 rounded-full shadow border-2 border-white hidden hover:bg-red-700 cursor-pointer">❌</button>
                </div>

                <!-- 글쓰기 구역 -->
                <div class="mt-4">
                    <textarea id="diary-text" rows="5" placeholder="오늘 있었던 일을 정성스럽게 적어보아요..." class="w-full p-4 border-4 border-amber-800 bg-white rounded-xl text-amber-950 font-bold text-xl leading-relaxed resize-none focus:outline-none placeholder-amber-700 placeholder-opacity-50 shadow-inner"></textarea>
                </div>
            </div>

            <button onclick="saveDiary()" class="w-full mt-4 bg-amber-800 hover:bg-amber-900 text-white text-2xl font-bold py-3 rounded-2xl border-4 border-amber-950 shadow-lg transition-transform active:scale-95 cursor-pointer">참 잘했어요 도장 꾹! 💮</button>
        </div>

        <!-- [오른쪽 페이지: 달력 및 단짝 친구] -->
        <div class="w-full md:w-1/2 flex flex-col justify-between md:pl-2">
            <div>
                <!-- 달력 헤더 -->
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="text-2xl font-bold text-amber-950 px-2 cursor-pointer">◀</button>
                    <h2 id="calendar-month-year" class="text-3xl font-bold text-amber-900">2026년 06월</h2>
                    <button onclick="changeMonth(1)" class="text-2xl font-bold text-amber-950 px-2 cursor-pointer">▶</button>
                </div>

                <!-- 요일 표시 -->
                <div class="grid grid-cols-7 gap-1 text-center font-bold text-amber-900 border-b-2 border-amber-800 pb-1 mb-2 text-lg">
                    <div class="text-red-600">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-600">토</div>
                </div>

                <!-- 달력 날짜 그리드 -->
                <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center font-bold"></div>
                
                <!-- 고도화 예정인 단짝 친구 및 커뮤니티 섹션 포스트 -->
                <div id="friend-section-container"></div>
            </div>
            
            <div class="text-right text-amber-800 font-bold text-sm mt-4 border-t-2 border-amber-800 pt-2 border-dashed">
                제 40대 몽글이 그림일기 전용 내부 규격
            </div>
        </div>
        
        <!-- 유튜브 배경음악 플레이어 (숨김 처리) -->
        <div id="youtube-player" class="hidden"></div>
    </div>

    <!-- ⚠️ 기능 스크립트 분할 로드 (반드시 이 순서대로 배치해야 합니다) -->
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
