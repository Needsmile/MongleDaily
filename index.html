        function setupCanvas() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            canvas.addEventListener('touchstart', startDrawingTouch);
            canvas.addEventListener('touchmove', drawTouch);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - 34;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function clearCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function startDrawing(e) {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!isDrawing) return;
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }

        function startDrawingTouch(e) {
            isDrawing = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
            e.preventDefault();
        }

        function drawTouch(e) {
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.getElementById('brush-color').value;
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        }

        function stopDrawing() { isDrawing = false; }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const compCanvas = document.createElement('canvas');
                        const compCtx = compCanvas.getContext('2d');
                        const max_width = 300;
                        const scale = max_width / img.width;
                        compCanvas.width = max_width;
                        compCanvas.height = img.height * scale;
                        compCtx.drawImage(img, 0, 0, compCanvas.width, compCanvas.height);
                        
                        selectedImageData = compCanvas.toDataURL('image/jpeg', 0.5); 
                        showFinalPreview(selectedImageData);
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function showFinalPreview(dataUrl) {
            const preview = document.getElementById('image-preview');
            preview.src = dataUrl;
            preview.classList.remove('hidden');
            document.getElementById('reset-media-btn').classList.remove('hidden');
        }

        function resetMediaSelection() {
            selectedImageData = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('reset-media-btn').classList.add('hidden');
            document.getElementById('image-input').value = "";
            clearCanvas();
        }

        // ★ 핵심: 작성한 일기를 실시간으로 인터넷 클라우드 DB에 집어넣는 비동기 처리 함수
        async function saveDiary(silent = false) {

		let imageUrl = "";
            const dateStr = selectedDiaryDate;
            const text = document.getElementById('diary-text').value;
            const weather = document.getElementById('weather').value;

            if(currentMode === 'draw' && !selectedImageData) {
                const thumbCanvas = document.createElement('canvas');
                const thumbCtx = thumbCanvas.getContext('2d');
                thumbCanvas.width = 300;
                thumbCanvas.height = (300 / canvas.width) * canvas.height;
                thumbCtx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
                selectedImageData = thumbCanvas.toDataURL('image/jpeg', 0.5);
            }

            if(!text && !selectedImageData) {
                alert('내용이나 그림을 작성해 주세요!');
                return;
            }
		 if (selectedImageData) {

        const fileName =
            `${childName}/${Date.now()}.jpg`;

        const blob =
            await (await fetch(selectedImageData)).blob();

        const { error: uploadError } =
            await _supabase.storage
                .from('diary-images')
                .upload(fileName, blob, {
                    contentType: 'image/jpeg',
                    upsert: true
                });

        if(uploadError) {
            throw uploadError;
        }

        const { data: publicUrlData } =
            _supabase.storage
                .from('diary-images')
                .getPublicUrl(fileName);

        imageUrl =
            publicUrlData.publicUrl;
    }

            // [Supabase Upsert 트랜잭션 실행] 기존 날짜가 있으면 덮어쓰고, 없으면 새로 삽입
            try {
                const { error } = await _supabase
                    .from('diary_entries')
                    .upsert({
                        diary_date: dateStr,
                        username: childName,
                        weather: weather,
                        diary_text: text,
                        image_data: imageUrl
                    }, { onConflict: 'username,diary_date' });

                if (error) throw error;

                if(!silent) {
if(soundEnabled) {

    stampSound.currentTime = 0;

    stampSound.play();
}
 				   alert('💮 일기를 잘 썼어요!');
		}
                
                // 로컬 상태 최신화 동기화
                await loadDiariesFromServer();
                renderTodayForm();
                renderCalendar();
            } catch(err) {
                alert('🚨 서버 전송 중 에러가 발생했습니다: ' + err.message);
            }
        }

const weekdays = [

    "토요일"
];

document.getElementById('current-date-display').innerText =

	    isDirty = false;
	}

function renderCalendar() {

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById('calendar-month-year').innerText =
        `${year}년 ${month + 1}월 방학 검사표`;

    const firstDayIndex =
        new Date(year, month, 1).getDay();

    const lastDay =
        new Date(year, month + 1, 0).getDate();

    const calendarDays =
        document.getElementById('calendar-days');

    calendarDays.innerHTML = "";

    for (let i = 0; i < firstDayIndex; i++) {
        calendarDays.appendChild(document.createElement('div'));
    }

    for (let day = 1; day <= lastDay; day++) {

        const dayDiv = document.createElement('div');

        const currentKey =
            `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

        // 오늘 날짜 기준
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const targetDate = new Date(year, month, day);

        const isFutureDate = targetDate > today;

        // 날짜 박스 스타일
        dayDiv.style.border = "2px dashed #8b5a2b";
        dayDiv.style.borderRadius = "0.5rem";
        dayDiv.style.padding = "0.25rem";
        dayDiv.style.height = "4.8rem";
        dayDiv.style.position = "relative";
        dayDiv.style.overflow = "hidden";
        dayDiv.style.display = "flex";
        dayDiv.style.flexDirection = "column";
        dayDiv.style.justifyContent = "space-between";
        dayDiv.style.cursor = "pointer";
        dayDiv.style.backgroundColor = "#ffffff";

        // 이미지 배경
        if (
            diaryDatabase[currentKey] &&
            diaryDatabase[currentKey].image
        ) {

            dayDiv.style.backgroundImage =
                `url(${diaryDatabase[currentKey].image})`;

            dayDiv.style.backgroundSize = 'cover';
            dayDiv.style.backgroundPosition = 'center';

            dayDiv.style.boxShadow =
                "inset 0 0 0 2000px rgba(255,255,255,0.5)";
        }

        // 날짜 숫자
        const dayNum = document.createElement('span');

        dayNum.innerText = day;

        dayNum.style.fontWeight = "bold";
        dayNum.style.fontSize = "1.25rem";

        const dayOfWeek =
            new Date(year, month, day).getDay();

        if (dayOfWeek === 0) {
            dayNum.style.color = "#ef4444";
        }

        if (dayOfWeek === 6) {
            dayNum.style.color = "#3b82f6";
        }

        dayDiv.appendChild(dayNum);

        // 미래 날짜 잠금
        if (isFutureDate) {

            dayDiv.style.opacity = "0.35";
            dayDiv.style.cursor = "not-allowed";
            dayDiv.style.backgroundColor = "#e5e7eb";
	   dayDiv.style.filter = "grayscale(0.5)";

            const lock = document.createElement('div');

            lock.innerText = "🔒";

            lock.style.position = "absolute";
            lock.style.bottom = "2px";
            lock.style.right = "4px";
            lock.style.fontSize = "14px";

            dayDiv.appendChild(lock);

            dayDiv.onclick = () => {
                alert("📅 미래 날짜의 일기는 아직 쓸 수 없어요!");
            };

        }
        // 작성된 일기
        else if (diaryDatabase[currentKey]) {
const prevDate = new Date(year, month, day);

prevDate.setDate(prevDate.getDate() - 1);

const prevKey =
    getFormattedDate(prevDate);

if (diaryDatabase[prevKey]) {

    const line = document.createElement('div');

    line.style.position = "absolute";
    line.style.left = "-8px";
    line.style.top = "50%";
    line.style.width = "16px";
    line.style.height = "4px";
    line.style.background = "#ef4444";

    dayDiv.appendChild(line);
}

            const icon = document.createElement('span');

            icon.innerText = "💮";

            icon.style.alignSelf = "flex-end";
            icon.style.fontSize = "1.25rem";

            dayDiv.appendChild(icon);

            dayDiv.onclick = () => {
                openModal(currentKey);
            };

        }
        // 빈 날짜
        else {

            dayDiv.onclick = () => {
                selectDiaryDate(currentKey);
            };

        }

        calendarDays.appendChild(dayDiv);
    }
}
        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function openModal(key) {
	    openedModalDate = key;
            const data = diaryDatabase[key];
            document.getElementById('modal-date').innerText = `📅 검사일: ${key} (${data.name || '어린이'})`;
            document.getElementById('modal-weather').innerText = `날씨: ${data.weather}`;
            document.getElementById('modal-text').innerText = data.text || "";
            
            const mImg = document.getElementById('modal-image');
            if(data.image) {
                mImg.src = data.image;
                mImg.style.display = 'block';
            } else {
                mImg.style.display = 'none';
            }
            document.getElementById('diary-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('diary-modal').style.display = 'none';
        }

        function getFormattedDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

	async function selectDiaryDate(newDate) {

  	  if(isDirty) {
	
	        const shouldSave = confirm(
	            "입력중인 일기를 저장할까요?"
	        );
	
	        if(shouldSave) {

	        }
	    }
	
	    selectedDiaryDate = newDate;
	
	    renderTodayForm();

	async function deleteDiary() {

    if(!confirm('정말 이 일기를 삭제할까요?')) {
        return;
    }

    try {

        const { error } = await _supabase
            .from('diary_entries')
            .delete()
            .eq('diary_date', openedModalDate)
            .eq('username', childName);

        if(error) throw error;

        delete diaryDatabase[openedModalDate];

        closeModal();

        renderCalendar();

        if(selectedDiaryDate === openedModalDate) {
            renderTodayForm();
        }

        alert('🗑️ 일기가 삭제되었습니다.');

    } catch(err) {

        alert('삭제 실패: ' + err.message);
    }
}

    if (isDirty) {

function saveUserName(name) {

    let users =
        JSON.parse(localStorage.getItem('diaryUsers') || '[]');

    if (!users.includes(name)) {
        users.unshift(name);
    }

    users = users.slice(0, 5);

    localStorage.setItem(
        'diaryUsers',
        JSON.stringify(users)
    );

    renderUserList();
}

function renderUserList() {

    const container =
        document.getElementById('recent-users');

    if (!container) return;

    const users =
        JSON.parse(localStorage.getItem('diaryUsers') || '[]');

    container.innerHTML = "";

    users.forEach(user => {

        const btn = document.createElement('button');

        btn.innerText = `🧒 ${user}`;

        btn.className =
            "px-3 py-1 bg-amber-100 hover:bg-amber-200 rounded-lg border border-amber-700 text-lg font-bold";

        btn.onclick = () => {

};

        container.appendChild(btn);

}

async function toggleCommunity() {

    const box =
        document.getElementById('community-list');

    if (!box.classList.contains('hidden')) {

        box.classList.add('hidden');
        return;
    }

    box.classList.remove('hidden');

    box.innerHTML = "불러오는 중...";

    const { data, error } = await _supabase
        .from('diary_entries')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(20);

    if (error) {

        box.innerHTML = "불러오기 실패";
        return;
    }

    box.innerHTML = "";

    data.forEach(item => {

        const div = document.createElement('div');

        div.className =
            "border-b border-amber-200 pb-2";

        div.innerHTML = `
            <div class="font-bold text-amber-900">
                🧒 ${item.username}
            </div>

            <div class="text-sm text-gray-600">
                📅 ${item.diary_date}
            </div>

            <div class="mt-1 text-amber-800 line-clamp-2">
                ${item.diary_text || ""}
            </div>
        `;

        box.appendChild(div);
    });
}

function calculateStreak() {

    const keys =
        Object.keys(diaryDatabase).sort();

    let streak = 0;

    let today = new Date();

    today.setHours(0,0,0,0);

    for(let i = 0; i < 365; i++) {

        const checkDate = new Date(today);

        checkDate.setDate(today.getDate() - i);

        const key =
            getFormattedDate(checkDate);

        if(keys.includes(key)) {

            streak++;

        } else {

            break;
        }
    }

    document.getElementById('streak-box').innerText =
        `💮 ${streak}일 연속 그림일기 작성중!`;
}
